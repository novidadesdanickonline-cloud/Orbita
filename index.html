<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>orbita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a0a2a, #000);
      color: white;
      text-align: center;
    }

    header {
      padding: 25px;
      background: #111144;
    }

    h1 {
      color: #00ccff;
      margin: 0;
      font-size: 40px;
    }

    .subtitulo {
      margin-top: 10px;
      font-size: 18px;
      color: #ccc;
    }

    .botoes {
      margin-top: 20px;
    }

    button {
      margin: 8px;
      padding: 12px 20px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      background: #00ccff;
      cursor: pointer;
      font-weight: bold;
    }

    .player {
      margin: 30px auto;
      width: 95%;
      max-width: 900px;
    }

    iframe {
      width: 100%;
      height: 450px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>🌌 orbita</h1>
  <div class="subtitulo">canais que você pode assistir</div>

  <div class="botoes">
    <button onclick="trocarCanal('nick836103')">Nick836103</button>
    <button onclick="trocarCanal('tvglobinhoredeglobio')">TV Globinho</button>
    <button onclick="trocarCanal('nickelodeonbrasil309873')">Nickelodeon Brasil</button>
    <button onclick="trocarCanal('channelg4tv')">G4TV</button>
  </div>

  <button onclick="fullScreen()">📺 Tela Cheia</button>
</header>

<div class="player">
  <iframe id="player"
    src="https://player.twitch.tv/?channel=nick836103&parent=novidadesdanickonline-cloud.github.io&autoplay=true&muted=true"
    allowfullscreen
    allow="fullscreen">
  </iframe>
</div>

<script>
function trocarCanal(canal) {
  const player = document.getElementById("player");
  player.src = `https://player.twitch.tv/?channel=${canal}&parent=novidadesdanickonline-cloud.github.io&autoplay=true&muted=true`;
}

function fullScreen() {
  const iframe = document.getElementById("player");
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  }
}
</script>

</body>
</html>
