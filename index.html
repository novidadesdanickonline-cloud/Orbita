<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>orbita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    header {
      padding: 15px;
      background: #111144;
    }

    h1 {
      color: #00ccff;
      margin: 0;
    }

    .subtitulo {
      margin-top: 5px;
      font-size: 16px;
      color: #ccc;
    }

    .botoes {
      margin-top: 10px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #00ccff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00aacc;
    }

    .player {
      width: 100%;
      height: calc(100vh - 140px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <h1>🌌 orbita</h1>
  <div class="subtitulo">canais que você pode assistir</div>

  <div class="botoes">
    <button onclick="trocarCanal('nick836103')">Nick836103</button>
    <button onclick="trocarCanal('tvglobinhoredeglobio')">TV Globinho</button>
    <button onclick="trocarCanal('nickelodeonbrasil309873')">Nickelodeon Brasil</button>
    <button onclick="trocarCanal('channelg4tv')">G4TV</button>
  </div>
</header>

<div class="player">
  <iframe id="player"
    src="https://player.twitch.tv/?channel=nick836103&parent=novidadesdanickonline-cloud.github.io&autoplay=true&muted=true">
  </iframe>
</div>

<script>
function trocarCanal(canal) {
  const player = document.getElementById("player");
  player.src = `https://player.twitch.tv/?channel=${canal}&parent=novidadesdanickonline-cloud.github.io&autoplay=true&muted=true`;
}
</script>

</body>
</html>
